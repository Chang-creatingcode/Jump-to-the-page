<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChangCreatingCode:页面跳转" />
    <title>ChangCreatingCode:页面跳转</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #e8ecf1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.04);
            padding: 18px;
            max-width: 400px;
            width: 100%;
            position: relative;
            min-height: 200px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        filter 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: auto;
        }
        .container-hidden {
            opacity: 0 !important;
            transform: scale(0.8) !important;
            filter: blur(10px) !important;
            pointer-events: none !important;
        }
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .container::before {
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
        }
        .container::after {
            bottom: -20px;
            left: -20px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
        }
        .page {
            display: none;
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .page.active {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #loadingPage.active {
            align-items: center;
            text-align: center;
        }
        .loading-spinner {
            width: 44px;
            height: 44px;
            margin: 16px auto 12px;
            border: 3px solid rgba(26, 115, 232, 0.2);
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.5;
            padding: 0 4px;
        }
        .icon-wrapper {
            width: 68px;
            height: 68px;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 12px;
            background: rgba(240, 242, 245, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: default; /* 默认不可点击，webapp模式下改为pointer */
            position: relative;
        }
        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .icon-wrapper svg {
            width: 44px;
            height: 44px;
            fill: #6b7280;
        }
        .icon-wrapper .warning-char {
            font-size: 44px;
            line-height: 1;
        }
        .icon-wrapper .icon-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 500;
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
        .icon-wrapper.clickable {
            cursor: pointer;
        }
        .icon-wrapper.clickable .icon-overlay {
            display: flex;
        }
        .message,
        .open-mode-hint,
        .text-sm {
            padding-left: 4px;
            padding-right: 4px;
        }
        .error-msg {
            padding: 8px 4px 4px;
            font-size: 17px;
            color: #dc2626;
            font-weight: 500;
            width: 100%;
        }
        .message {
            font-size: 15px;
            color: #1f2937;
            line-height: 1.6;
            margin-bottom: 12px;
            word-break: break-all;
            width: 100%;
        }
        .message .url {
            font-weight: 500;
            color: #111827;
            background: rgba(243, 244, 246, 0.7);
            padding: 0 6px;
            border-radius: 4px;
            display: inline-block;
            max-width: 100%;
            word-break: break-all;
        }
        .open-mode-hint {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 16px;
            width: 100%;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 4px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: box-shadow 0.2s;
            text-align: center;
            color: #ffffff;
            background: #1a73e8;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn:focus {
            outline: none;
            box-shadow: none !important;
        }
        .btn-primary {
            background: #1a73e8;
            box-shadow: 0 2px 12px rgba(26, 115, 232, 0.25);
        }
        .btn-primary:hover {
            background: #1a6edb;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.35);
        }
        .btn-secondary {
            background: rgba(209, 213, 219, 0.7);
            backdrop-filter: blur(4px);
            color: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .btn-secondary:hover {
            background: rgba(185, 191, 199, 0.8);
        }
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            width: 80px;
            height: 80px;
            margin-left: -40px;
            margin-top: -40px;
            opacity: 0.6;
            transition: none;
            will-change: left, top;
        }
        .btn-primary .ripple {
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
        }
        .text-sm {
            font-size: 13px;
            color: #6b7280;
            margin-top: 8px;
            width: 100%;
        }
        /* webapp 模式复选框样式 */
        .webapp-checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            width: 100%;
            padding-left: 4px;
            font-size: 14px;
            color: #1f2937;
        }
        .webapp-checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1a73e8;
            cursor: pointer;
        }
        #fullscreenIframeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10000;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
        }
        #fullscreenIframeContainer iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
            background: white;
        }
        #iframeLoadingMask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: opacity 0.3s;
        }
        #iframeLoadingMask .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(26,115,232,0.2);
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        #iframeLoadingMask .text {
            color: #4b5563;
            font-size: 13px;
        }
        #iframeLoadingMask.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .hidden { display: none !important; }
        @media (max-width: 400px) {
            .btn { padding: 12px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
<!-- 容器默认隐藏，由 JS 控制显示 -->
<div class="container container-hidden" id="app">
    <!-- 加载页 -->
    <div id="loadingPage" class="page active">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在解析Url参数，请等待加载完成再执行“添加到主屏幕”操作</div>
    </div>
    <!-- 确认页（同时支持普通模式和 webapp 模式） -->
    <div id="confirmPage" class="page">
        <!-- 图标区域 -->
        <div class="icon-wrapper" id="iconWrapper">
            <img id="faviconImg" src="" alt="网站图标" />
            <svg id="fallbackSvg" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
            <div class="icon-overlay">点击更换</div>
        </div>
        <!-- 标题文字 -->
        <div class="message" id="confirmMessage">
            <span>此页面想要跳转到</span>
            <span>（</span>
            <span class="url" id="targetUrlDisplay"></span>
            <span>），是否继续？</span>
        </div>
        <!-- 打开方式提示（普通模式） -->
        <div id="openModeHint" class="open-mode-hint"></div>
        <!-- 按钮组（普通模式） -->
        <div class="button-group" id="normalButtons">
            <button class="btn btn-primary" id="confirmBtn">确定</button>
            <button class="btn btn-secondary" id="cancelBtn">取消</button>
        </div>
        <!-- webapp 模式专用：复选框 -->
        <div id="webappCheckboxGroup" class="webapp-checkbox-group" style="display:none;">
            <input type="checkbox" id="webappCheckbox" />
            <label for="webappCheckbox">添加到主屏幕后无需确认跳转</label>
        </div>
    </div>
    <!-- 错误页 -->
    <div id="errorPage" class="page">
        <div class="icon-wrapper"><span class="warning-char">⚠</span></div>
        <div class="error-msg">此页面未正确配置Url参数，无法跳转</div>
        <div class="text-sm">请检查链接格式<br />示例：?Domain-name=www.baidu.com&https-visit=true&open-mode=iframe</div>
        <div class="button-group" style="margin-top:16px;">
            <button class="btn btn-primary" id="errorOkBtn">好</button>
        </div>
    </div>
</div>
<!-- 隐藏的文件选择器 -->
<input type="file" id="fileInput" accept="image/*" style="display:none;" />

<!-- iframe 容器 -->
<div id="fullscreenIframeContainer">
    <div id="iframeLoadingMask">
        <div class="spinner"></div>
        <div class="text">正在加载目标页面...</div>
    </div>
    <iframe id="fullscreenIframe" src="about:blank"></iframe>
</div>

<script>
(function() {
    // ---------- 容器动画控制 ----------
    var container = document.getElementById('app');
    requestAnimationFrame(function() {
        container.classList.remove('container-hidden');
    });

    // ---------- 参数解析 ----------
    function getParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
    }
    function cleanDomain(domain) {
        return domain.replace(/^https?:\/\//, '');
    }
    function showPage(pageId) {
        var pages = document.querySelectorAll('.page');
        for (var i = 0; i < pages.length; i++) {
            pages[i].classList.remove('active');
        }
        document.getElementById(pageId).classList.add('active');
    }
    function injectAppleTouchIcon(url) {
        var oldLink = document.querySelector('link[rel="apple-touch-icon"]');
        if (oldLink) oldLink.remove();
        var link = document.createElement('link');
        link.rel = 'apple-touch-icon';
        link.href = url;
        document.head.appendChild(link);
    }

    var domain = getParam('Domain-name');
    var httpsFlag = getParam('https-visit');
    var openMode = getParam('open-mode');
    var webappMode = getParam('webapp-mode'); // true/false

    if (openMode && !['redirect', 'iframe', 'newwindow'].includes(openMode)) {
        openMode = 'redirect';
    }
    if (!openMode) openMode = 'redirect';
    // 判断 webappMode 是否为 true（不区分大小写）
    var isWebapp = webappMode && webappMode.toLowerCase() === 'true';

    var isValid = false;
    var targetUrl = '';
    if (domain) {
        domain = cleanDomain(domain);
        if (domain.length > 0) {
            var useHttps = httpsFlag && httpsFlag.toLowerCase() === 'true';
            targetUrl = (useHttps ? 'https://' : 'http://') + domain;
            isValid = true;
        }
    }

    // ---------- webapp 模式：检查是否已记录无需确认 ----------
    if (isValid && isWebapp) {
        var storageKey = 'webapp_skip_confirm_' + domain;
        var skipConfirm = localStorage.getItem(storageKey) === 'true';
        if (skipConfirm) {
            // 直接跳转（不显示确认页）
            window.location.href = targetUrl;
            return; // 终止后续执行
        }
    }

    // ---------- 动作封装 ----------
    function performAction(action) {
        if (action === 'confirm') {
            if (openMode === 'redirect') {
                window.location.href = targetUrl;
            } else if (openMode === 'newwindow') {
                var newWin = window.open(targetUrl, '_blank');
                if (!newWin || newWin.closed || typeof newWin.closed === 'undefined') {
                    alert('弹窗被浏览器拦截，请允许本站弹出窗口，或更换为其他打开方式。');
                }
            } else if (openMode === 'iframe') {
                var containerIframe = document.getElementById('fullscreenIframeContainer');
                var iframe = document.getElementById('fullscreenIframe');
                var loadingMask = document.getElementById('iframeLoadingMask');
                containerIframe.style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                loadingMask.classList.remove('hidden');
                iframe.src = targetUrl;
                iframe.onload = function() {
                    loadingMask.classList.add('hidden');
                };
                iframe.onerror = function() {
                    loadingMask.classList.add('hidden');
                };
            }
        } else if (action === 'cancel') {
            history.back();
        } else if (action === 'errorOk') {
            container.classList.add('container-hidden');
        }
    }

    // ---------- 加载图标并处理界面 ----------
    if (isValid) {
        var faviconImg = document.getElementById('faviconImg');
        var fallbackSvg = document.getElementById('fallbackSvg');
        var targetUrlDisplay = document.getElementById('targetUrlDisplay');
        var openModeHint = document.getElementById('openModeHint');
        var confirmMessage = document.getElementById('confirmMessage');
        var normalButtons = document.getElementById('normalButtons');
        var webappCheckboxGroup = document.getElementById('webappCheckboxGroup');
        var iconWrapper = document.getElementById('iconWrapper');
        var fileInput = document.getElementById('fileInput');

        targetUrlDisplay.textContent = targetUrl;

        // 根据 webapp 模式调整界面
        if (isWebapp) {
            // 修改标题
            confirmMessage.innerHTML = '<span>将</span><span class="url">' + targetUrl + '</span><span>添加到主屏幕？</span>';
            // 隐藏普通按钮
            normalButtons.style.display = 'none';
            // 显示复选框
            webappCheckboxGroup.style.display = 'flex';
            // 图标变为可点击
            iconWrapper.classList.add('clickable');
            // 隐藏打开方式提示（webapp 模式下不需要）
            openModeHint.style.display = 'none';

            // 复选框逻辑：勾选后记录到 localStorage
            var checkbox = document.getElementById('webappCheckbox');
            checkbox.addEventListener('change', function() {
                var key = 'webapp_skip_confirm_' + domain;
                if (this.checked) {
                    localStorage.setItem(key, 'true');
                } else {
                    localStorage.removeItem(key);
                }
            });
            // 如果之前已记录，但未跳转（可能因为某些原因），则自动勾选
            var stored = localStorage.getItem('webapp_skip_confirm_' + domain);
            if (stored === 'true') {
                checkbox.checked = true;
            }

            // 点击图标触发文件选择
            iconWrapper.addEventListener('click', function(e) {
                // 防止触发其他事件
                e.stopPropagation();
                fileInput.click();
            });

            // 文件选择回调
            fileInput.addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    var dataUrl = ev.target.result;
                    // 替换图标显示
                    faviconImg.src = dataUrl;
                    faviconImg.style.display = 'block';
                    fallbackSvg.style.display = 'none';
                    // 更新 apple-touch-icon
                    injectAppleTouchIcon(dataUrl);
                    // 重置文件输入，允许重复选择同一文件
                    fileInput.value = '';
                };
                reader.readAsDataURL(file);
            });

        } else {
            // 普通模式：显示打开方式
            var modeMap = {
                'redirect': '当前窗口跳转',
                'iframe': '内嵌全屏浏览',
                'newwindow': '新标签页打开'
            };
            openModeHint.textContent = '打开方式：' + (modeMap[openMode] || '当前窗口跳转');
            // 图标不可点击
            iconWrapper.classList.remove('clickable');
            // 隐藏复选框
            webappCheckboxGroup.style.display = 'none';
            // 确保按钮显示
            normalButtons.style.display = 'flex';
            // 确保打开方式提示显示
            openModeHint.style.display = 'block';
        }

        // 加载 favicon
        var iconUrl = 'https://' + domain + '/favicon.ico';
        var isFinished = false;
        function finishLoading(iconSrc) {
            if (isFinished) return;
            isFinished = true;
            // 如果未在 webapp 模式下自定义图片，则注入默认图标
            if (!isWebapp || !faviconImg.src || faviconImg.src === '' || faviconImg.src === window.location.href) {
                injectAppleTouchIcon(iconSrc);
            }
            if (iconSrc === iconUrl) {
                faviconImg.src = iconUrl;
                faviconImg.style.display = 'block';
                fallbackSvg.style.display = 'none';
            } else {
                faviconImg.style.display = 'none';
                fallbackSvg.style.display = 'block';
            }
            showPage('confirmPage');
        }
        var timeoutId = setTimeout(function() {
            if (!isFinished) {
                var svgElem = document.getElementById('fallbackSvg');
                var svgData = new XMLSerializer().serializeToString(svgElem);
                var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                var reader = new FileReader();
                reader.onload = function() {
                    finishLoading(reader.result);
                };
                reader.readAsDataURL(svgBlob);
            }
        }, 5000);
        faviconImg.src = iconUrl;
        faviconImg.onload = function() {
            clearTimeout(timeoutId);
            if (!isFinished) finishLoading(iconUrl);
        };
        faviconImg.onerror = function() {
            clearTimeout(timeoutId);
            if (!isFinished) {
                var svgElem = document.getElementById('fallbackSvg');
                var svgData = new XMLSerializer().serializeToString(svgElem);
                var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                var reader = new FileReader();
                reader.onload = function() {
                    finishLoading(reader.result);
                };
                reader.readAsDataURL(svgBlob);
            }
        };
    } else {
        showPage('errorPage');
    }

    // ---------- 按钮交互（仅高光，无形变） ----------
    var btns = document.querySelectorAll('.btn');
    var activeBtn = null;
    var ripple = null;
    var isPointerDown = false;

    btns.forEach(function(btn) {
        btn.addEventListener('pointerdown', onPointerDown);
    });

    function onPointerDown(e) {
        var btn = e.currentTarget;
        e.preventDefault();

        if (ripple) {
            ripple.remove();
            ripple = null;
        }

        ripple = document.createElement('span');
        ripple.className = 'ripple';
        var size = Math.min(btn.offsetWidth * 0.6, 120);
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.marginLeft = (-size/2) + 'px';
        ripple.style.marginTop = (-size/2) + 'px';
        btn.appendChild(ripple);

        var rect = btn.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var half = size / 2;
        x = Math.min(Math.max(x, half), rect.width - half);
        y = Math.min(Math.max(y, half), rect.height - half);
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';

        isPointerDown = true;
        activeBtn = btn;
        btn.setPointerCapture(e.pointerId);
        btn.addEventListener('pointermove', onPointerMove);
        btn.addEventListener('pointerup', onPointerUp);
        btn.addEventListener('pointercancel', onPointerCancel);
    }

    function onPointerMove(e) {
        if (!isPointerDown || !activeBtn || !ripple) return;

        var btn = activeBtn;
        var rect = btn.getBoundingClientRect();

        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var size = parseFloat(ripple.style.width);
        var half = size / 2;
        x = Math.min(Math.max(x, half), rect.width - half);
        y = Math.min(Math.max(y, half), rect.height - half);
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';

        e.preventDefault();
    }

    function onPointerUp(e) {
        if (!isPointerDown || !activeBtn) {
            cleanup();
            return;
        }

        var btn = activeBtn;
        var rect = btn.getBoundingClientRect();
        var isInside = (e.clientX >= rect.left && e.clientX <= rect.right &&
                        e.clientY >= rect.top && e.clientY <= rect.bottom);

        if (isInside) {
            var action = null;
            if (btn.id === 'confirmBtn') action = 'confirm';
            else if (btn.id === 'cancelBtn') action = 'cancel';
            else if (btn.id === 'errorOkBtn') action = 'errorOk';
            if (action) performAction(action);
        }

        cleanup();
        e.preventDefault();
    }

    function onPointerCancel(e) {
        cleanup();
        e.preventDefault();
    }

    function cleanup() {
        if (activeBtn) {
            activeBtn.releasePointerCapture && activeBtn.releasePointerCapture(activeBtn._pointerId);
            activeBtn.removeEventListener('pointermove', onPointerMove);
            activeBtn.removeEventListener('pointerup', onPointerUp);
            activeBtn.removeEventListener('pointercancel', onPointerCancel);
        }
        if (ripple) {
            ripple.remove();
            ripple = null;
        }
        isPointerDown = false;
        activeBtn = null;
    }

    // ---------- 错误页“好”按钮关闭动画已在 performAction 中处理 ----------
})();
</script>
</body>
</html>
