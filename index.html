<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChangCreatingCode:页面跳转" />
    <title>ChangCreatingCode:页面跳转</title>
    <style>
        /* ===== 样式与之前完全相同 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #e8ecf1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.04);
            padding: 18px;
            max-width: 400px;
            width: 100%;
            position: relative;
            min-height: 200px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        filter 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: auto;
        }
        .container-hidden {
            opacity: 0 !important;
            transform: scale(0.8) !important;
            filter: blur(10px) !important;
            pointer-events: none !important;
        }
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .container::before {
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
        }
        .container::after {
            bottom: -20px;
            left: -20px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
        }
        .page {
            display: none;
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .page.active {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #loadingPage.active {
            align-items: center;
            text-align: center;
        }
        .loading-spinner {
            width: 44px;
            height: 44px;
            margin: 16px auto 12px;
            border: 3px solid rgba(26, 115, 232, 0.2);
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.5;
            padding: 0 4px;
        }
        .icon-wrapper {
            width: 68px;
            height: 68px;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 12px;
            background: rgba(240, 242, 245, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: default;
            position: relative;
        }
        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .icon-wrapper svg {
            width: 44px;
            height: 44px;
            fill: #6b7280;
        }
        .icon-wrapper .warning-char {
            font-size: 44px;
            line-height: 1;
        }
        .message,
        .open-mode-hint,
        .text-sm,
        .guide-text {
            padding-left: 4px;
            padding-right: 4px;
        }
        .error-msg {
            padding: 8px 4px 4px;
            font-size: 17px;
            color: #dc2626;
            font-weight: 500;
            width: 100%;
        }
        .message {
            font-size: 15px;
            color: #1f2937;
            line-height: 1.6;
            margin-bottom: 12px;
            word-break: break-all;
            width: 100%;
        }
        .message .url {
            font-weight: 500;
            color: #111827;
            background: rgba(243, 244, 246, 0.7);
            padding: 0 6px;
            border-radius: 4px;
            display: inline-block;
            max-width: 100%;
            word-break: break-all;
        }
        .open-mode-hint {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 16px;
            width: 100%;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 4px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: box-shadow 0.2s;
            text-align: center;
            color: #ffffff;
            background: #1a73e8;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn:focus {
            outline: none;
            box-shadow: none !important;
        }
        .btn-primary {
            background: #1a73e8;
            box-shadow: 0 2px 12px rgba(26, 115, 232, 0.25);
        }
        .btn-primary:hover {
            background: #1a6edb;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.35);
        }
        .btn-secondary {
            background: rgba(209, 213, 219, 0.7);
            backdrop-filter: blur(4px);
            color: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .btn-secondary:hover {
            background: rgba(185, 191, 199, 0.8);
        }
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            width: 80px;
            height: 80px;
            margin-left: -40px;
            margin-top: -40px;
            opacity: 0.6;
            transition: none;
            will-change: left, top;
        }
        .btn-primary .ripple {
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
        }
        .text-sm {
            font-size: 13px;
            color: #6b7280;
            margin-top: 8px;
            width: 100%;
        }
        /* WebApp 引导样式 */
        .guide-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            width: 100%;
            text-align: left;
        }
        .guide-input {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            background: rgba(209, 213, 219, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            outline: none;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }
        }
        .guide-input::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }
        .guide-icon-area {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin: 12px 0;
            cursor: pointer;
        }
        .guide-icon-area .icon-thumb {
            width: 70px;
            height: 70px;
            border-radius: 25px;
            overflow: hidden;
            background: rgba(240, 242, 245, 0.6);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .guide-icon-area .icon-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .guide-icon-area .icon-thumb svg {
            width: 32px;
            height: 32px;
            fill: #6b7280;
        }
        .guide-icon-area .icon-label {
            font-size: 14px;
            color: #1f2937;
            line-height: 1.4;
        }
        .guide-step {
            width: 100%;
            margin-top: 16px;
        }
        .guide-step .step-image {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #e5e7eb;
            
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
        }
        .guide-step .step-image img {
            width: 100%;
            height: auto;
            
            display: block;
        }
        .guide-step .step-desc {
            font-size: 14px;
            color: #1f2937;
            line-height: 1.5;
            padding-left: 4px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 2px;
        }
        .guide-step .step-desc svg {
            vertical-align: middle;
        }
        .guide-step .step-desc .step-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
        }
        .guide-done-btn {
            margin-top: 20px;
        }

        #fullscreenIframeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10000;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
        }
        #fullscreenIframeContainer iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
            background: white;
        }
        #iframeLoadingMask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: opacity 0.3s;
        }
        #iframeLoadingMask .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(26,115,232,0.2);
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        #iframeLoadingMask .text {
            color: #4b5563;
            font-size: 13px;
        }
        #iframeLoadingMask.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .hidden { display: none !important; }
        @media (max-width: 400px) {
            .btn { padding: 12px 16px; font-size: 14px; }
            .guide-icon-area .icon-label { font-size: 13px; }
        }
    </style>
</head>

<script>
(function() {
    // ---------- 工具函数 ----------
    function getParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
    }
    function cleanDomain(domain) {
        return domain.replace(/^https?:\/\//, '');
    }
    function showPage(pageId) {
        var pages = document.querySelectorAll('.page');
        for (var i = 0; i < pages.length; i++) {
            pages[i].classList.remove('active');
        }
        document.getElementById(pageId).classList.add('active');
    }
    function injectAppleTouchIcon(url) {
        var oldLink = document.querySelector('link[rel="apple-touch-icon"]');
        if (oldLink) oldLink.remove();
        var link = document.createElement('link');
        link.rel = 'apple-touch-icon';
        link.href = url;
        document.head.appendChild(link);
    }
    function updateAppTitle(title) {
        var meta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (!meta) {
            meta = document.createElement('meta');
            meta.name = 'apple-mobile-web-app-title';
            document.head.appendChild(meta);
        }
        meta.content = title;
        document.title = title;
    }

    // ---------- 检测独立模式（主屏幕启动） ----------
    function isStandalone() {
        if (window.navigator.standalone) return true;
        if (window.matchMedia('(display-mode: standalone)').matches) return true;
        return false;
    }

    // ---------- 参数解析 ----------
    var domainRaw = getParam('Domain-name');
    var httpsFlag = getParam('https-visit');
    var openMode = getParam('open-mode');
    var webappMode = getParam('webapp-mode');
    var isWebapp = webappMode && webappMode.toLowerCase() === 'true';

    if (openMode && !['redirect', 'iframe', 'newwindow'].includes(openMode)) {
        openMode = 'redirect';
    }
    if (!openMode) openMode = 'redirect';

    var isValid = false;
    var targetUrl = '';
    var domain = '';
    if (domainRaw) {
        domain = cleanDomain(domainRaw);
        if (domain.length > 0) {
            var useHttps = httpsFlag && httpsFlag.toLowerCase() === 'true';
            targetUrl = (useHttps ? 'https://' : 'http://') + domain;
            isValid = true;
        }
    }

    // ---------- 默认标题 ----------
    function getDefaultTitle() {
        return 'webApp·' + targetUrl;
    }

    // ---------- 动作封装 ----------
    function performAction(action) {
        if (action === 'confirm') {
            if (openMode === 'redirect') {
                window.location.href = targetUrl;
            } else if (openMode === 'newwindow') {
                var newWin = window.open(targetUrl, '_blank');
                if (!newWin || newWin.closed || typeof newWin.closed === 'undefined') {
                    alert('弹窗被浏览器拦截，请允许本站弹出窗口，或更换为其他打开方式。');
                }
            } else if (openMode === 'iframe') {
                var containerIframe = document.getElementById('fullscreenIframeContainer');
                var iframe = document.getElementById('fullscreenIframe');
                var loadingMask = document.getElementById('iframeLoadingMask');
                containerIframe.style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                loadingMask.classList.remove('hidden');
                iframe.src = targetUrl;
                iframe.onload = function() {
                    loadingMask.classList.add('hidden');
                };
                iframe.onerror = function() {
                    loadingMask.classList.add('hidden');
                };
            }
        } else if (action === 'cancel') {
            history.back();
        } else if (action === 'errorOk') {
            document.getElementById('app').classList.add('container-hidden');
        } else if (action === 'webappOk') {
            document.getElementById('app').classList.add('container-hidden');
        }
    }

    // ---------- 独立模式：直接以指定模式打开 ----------
    if (isValid && isStandalone()) {
        if (targetUrl) {
            var defaultTitle = getDefaultTitle();
            var iconUrl = 'https://' + domain + '/favicon.ico';
            updateAppTitle(defaultTitle);
            injectAppleTouchIcon(iconUrl);
        }
        performAction('confirm');
        return;
    }

    // ---------- 非独立模式：正常显示卡片 ----------
    var container = document.getElementById('app');
    requestAnimationFrame(function() {
        container.classList.remove('container-hidden');
    });

    // ---------- 加载图标并配置UI ----------
    if (isValid) {
        var faviconImg = document.getElementById('faviconImg');
        var fallbackSvg = document.getElementById('fallbackSvg');
        var targetUrlDisplay = document.getElementById('targetUrlDisplay');
        var openModeHint = document.getElementById('openModeHint');
        var confirmMessage = document.getElementById('confirmMessage');
        var normalButtons = document.getElementById('normalButtons');
        var normalContent = document.getElementById('normalContent');
        var webappGuideContent = document.getElementById('webappGuideContent');
        var webappOkBtn = document.getElementById('webappOkBtn');
        var iconWrapper = document.getElementById('iconWrapper');

        // WebApp 引导元素
        var guideTitle = document.getElementById('guideTitle');
        var guideTargetUrl = document.getElementById('guideTargetUrl');
        var appNameInput = document.getElementById('appNameInput');
        var guideIconThumb = document.getElementById('guideIconThumb');
        var guideIconImg = document.getElementById('guideIconImg');
        var guideFallbackSvg = document.getElementById('guideFallbackSvg');
        var iconArea = document.getElementById('iconArea');
        var step1Image = document.getElementById('step1Image');
        var step2Image = document.getElementById('step2Image');
        var step3Image = document.getElementById('step3Image');
        var fileInput = document.getElementById('fileInput');

        targetUrlDisplay.textContent = targetUrl;
        guideTargetUrl.textContent = targetUrl;

        if (isWebapp) {
            // WebApp 模式：显示引导，隐藏普通内容
            normalContent.style.display = 'none';
            webappGuideContent.style.display = 'block';

            // 设置默认应用名称
            var defaultTitle = getDefaultTitle();
            appNameInput.value = defaultTitle;
            updateAppTitle(defaultTitle);

            // 图标显示（使用 favicon）
            var iconUrl = 'https://' + domain + '/favicon.ico';
            guideIconImg.src = iconUrl;
            guideIconImg.onload = function() {
                guideIconImg.style.display = 'block';
                guideFallbackSvg.style.display = 'none';
            };
            guideIconImg.onerror = function() {
                guideIconImg.style.display = 'none';
                guideFallbackSvg.style.display = 'block';
            };
            // 同时也更新卡片图标
            faviconImg.src = iconUrl;
            faviconImg.onload = function() {
                faviconImg.style.display = 'block';
                fallbackSvg.style.display = 'none';
            };
            faviconImg.onerror = function() {
                faviconImg.style.display = 'none';
                fallbackSvg.style.display = 'block';
            };
            injectAppleTouchIcon(iconUrl);

            // 输入框事件：实时更新 meta title
            appNameInput.addEventListener('input', function() {
                var val = this.value.trim();
                if (val === '') {
                    updateAppTitle(defaultTitle);
                } else {
                    updateAppTitle(val);
                }
            });
            appNameInput.addEventListener('blur', function() {
                if (this.value.trim() === '') {
                    this.value = defaultTitle;
                    updateAppTitle(defaultTitle);
                }
            });

            // 点击图标区域触发文件选择
            iconArea.addEventListener('click', function() {
                fileInput.click();
            });
            fileInput.addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    var dataUrl = ev.target.result;
                    // 更新引导图标
                    guideIconImg.src = dataUrl;
                    guideIconImg.style.display = 'block';
                    guideFallbackSvg.style.display = 'none';
                    // 更新卡片图标
                    faviconImg.src = dataUrl;
                    faviconImg.style.display = 'block';
                    fallbackSvg.style.display = 'none';
                    // 更新 apple-touch-icon
                    injectAppleTouchIcon(dataUrl);
                    fileInput.value = '';
                };
                reader.readAsDataURL(file);
            });

            // 好按钮
            webappOkBtn.addEventListener('click', function() {
                performAction('webappOk');
            });

        } else {
            // 普通模式
            normalContent.style.display = 'block';
            webappGuideContent.style.display = 'none';
            var modeMap = {
                'redirect': '当前窗口跳转',
                'iframe': '内嵌全屏浏览',
                'newwindow': '新标签页打开'
            };
            openModeHint.textContent = '打开方式：' + (modeMap[openMode] || '当前窗口跳转');
            iconWrapper.classList.remove('clickable');
            // 加载 favicon 并注入默认图标
            var iconUrl2 = 'https://' + domain + '/favicon.ico';
            faviconImg.src = iconUrl2;
            faviconImg.onload = function() {
                faviconImg.style.display = 'block';
                fallbackSvg.style.display = 'none';
                injectAppleTouchIcon(iconUrl2);
            };
            faviconImg.onerror = function() {
                faviconImg.style.display = 'none';
                fallbackSvg.style.display = 'block';
                var svgElem = document.getElementById('fallbackSvg');
                var svgData = new XMLSerializer().serializeToString(svgElem);
                var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                var reader = new FileReader();
                reader.onload = function() {
                    injectAppleTouchIcon(reader.result);
                };
                reader.readAsDataURL(svgBlob);
            };
        }

        showPage('confirmPage');

    } else {
        showPage('errorPage');
    }

    // ---------- 按钮交互（仅高光） ----------
    var btns = document.querySelectorAll('.btn');
    var activeBtn = null;
    var ripple = null;
    var isPointerDown = false;

    btns.forEach(function(btn) {
        btn.addEventListener('pointerdown', onPointerDown);
    });

    // 输入框高光（不触发点击事件）
    var inputs = document.querySelectorAll('.guide-input');
    inputs.forEach(function(input) {
        input.addEventListener('pointerdown', onInputPointerDown);
    });

    function onInputPointerDown(e) {
        var input = e.currentTarget;
        var ripple = document.createElement('span');
        ripple.className = 'ripple';
        var size = Math.min(input.offsetWidth * 0.6, 120);
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.marginLeft = (-size/2) + 'px';
        ripple.style.marginTop = (-size/2) + 'px';
        input.style.position = 'relative';
        input.style.overflow = 'hidden';
        input.appendChild(ripple);

        var rect = input.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var half = size / 2;
        x = Math.min(Math.max(x, half), rect.width - half);
        y = Math.min(Math.max(y, half), rect.height - half);
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';

        var onUp = function() {
            if (ripple.parentNode) ripple.remove();
            document.removeEventListener('pointerup', onUp);
        };
        document.addEventListener('pointerup', onUp);
    }

    function onPointerDown(e) {
        var btn = e.currentTarget;
        e.preventDefault();

        if (ripple) {
            ripple.remove();
            ripple = null;
        }
        ripple = document.createElement('span');
        ripple.className = 'ripple';
        var size = Math.min(btn.offsetWidth * 0.6, 120);
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.marginLeft = (-size/2) + 'px';
        ripple.style.marginTop = (-size/2) + 'px';
        btn.appendChild(ripple);

        var rect = btn.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var half = size / 2;
        x = Math.min(Math.max(x, half), rect.width - half);
        y = Math.min(Math.max(y, half), rect.height - half);
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';

        isPointerDown = true;
        activeBtn = btn;
        btn.setPointerCapture(e.pointerId);
        btn.addEventListener('pointermove', onPointerMove);
        btn.addEventListener('pointerup', onPointerUp);
        btn.addEventListener('pointercancel', onPointerCancel);
    }

    function onPointerMove(e) {
        if (!isPointerDown || !activeBtn || !ripple) return;
        var btn = activeBtn;
        var rect = btn.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var size = parseFloat(ripple.style.width);
        var half = size / 2;
        x = Math.min(Math.max(x, half), rect.width - half);
        y = Math.min(Math.max(y, half), rect.height - half);
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        e.preventDefault();
    }

    function onPointerUp(e) {
        if (!isPointerDown || !activeBtn) {
            cleanup();
            return;
        }
        var btn = activeBtn;
        var rect = btn.getBoundingClientRect();
        var isInside = (e.clientX >= rect.left && e.clientX <= rect.right &&
                        e.clientY >= rect.top && e.clientY <= rect.bottom);
        if (isInside) {
            var action = null;
            if (btn.id === 'confirmBtn') action = 'confirm';
            else if (btn.id === 'cancelBtn') action = 'cancel';
            else if (btn.id === 'errorOkBtn') action = 'errorOk';
            else if (btn.id === 'webappOkBtn') action = 'webappOk';
            if (action) performAction(action);
        }
        cleanup();
        e.preventDefault();
    }

    function onPointerCancel(e) {
        cleanup();
        e.preventDefault();
    }

    function cleanup() {
        if (activeBtn) {
            activeBtn.releasePointerCapture && activeBtn.releasePointerCapture(activeBtn._pointerId);
            activeBtn.removeEventListener('pointermove', onPointerMove);
            activeBtn.removeEventListener('pointerup', onPointerUp);
            activeBtn.removeEventListener('pointercancel', onPointerCancel);
        }
        if (ripple) {
            ripple.remove();
            ripple = null;
        }
        isPointerDown = false;
        activeBtn = null;
    }

})();
</script>
</body>
</html>
