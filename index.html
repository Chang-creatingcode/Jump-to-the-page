<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ChangCreatingCode:页面跳转</title>
    <style>
        /* ===== 样式与之前完全相同，无改动 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #e8ecf1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            position: relative;
        }
        .container {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.04);
            padding: 18px;
            max-width: 400px;
            width: 100%;
            position: relative;
            min-height: 200px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        filter 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: auto;
            z-index: 10;
        }
        .container-hidden {
            opacity: 0 !important;
            transform: scale(0.8) !important;
            filter: blur(10px) !important;
            pointer-events: none !important;
        }
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .container::before {
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
        }
        .container::after {
            bottom: -20px;
            left: -20px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
        }
        .page {
            display: none;
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .page.active {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #loadingPage.active {
            align-items: center;
            text-align: center;
        }
        .loading-spinner {
            width: 44px;
            height: 44px;
            margin: 16px auto 12px;
            border: 3px solid rgba(26, 115, 232, 0.2);
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.5;
            padding: 0 4px;
        }
        .icon-wrapper {
            width: 68px;
            height: 68px;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 12px;
            background: rgba(240, 242, 245, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: default;
            position: relative;
        }
        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .icon-wrapper svg {
            width: 44px;
            height: 44px;
            fill: #6b7280;
        }
        .icon-wrapper .warning-char {
            font-size: 44px;
            line-height: 1;
        }
        .message,
        .open-mode-hint,
        .text-sm {
            padding-left: 4px;
            padding-right: 4px;
        }
        .error-msg {
            padding: 8px 4px 4px;
            font-size: 17px;
            color: #dc2626;
            font-weight: 500;
            width: 100%;
        }
        .message {
            font-size: 15px;
            color: #1f2937;
            line-height: 1.6;
            margin-bottom: 12px;
            word-break: break-all;
            width: 100%;
        }
        .message .url {
            font-weight: 500;
            color: #111827;
            background: rgba(243, 244, 246, 0.7);
            padding: 0 6px;
            border-radius: 4px;
            display: inline-block;
            max-width: 100%;
            word-break: break-all;
        }
        .open-mode-hint {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 16px;
            width: 100%;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 4px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: box-shadow 0.2s;
            text-align: center;
            color: #ffffff;
            background: #1a73e8;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn:focus {
            outline: none;
            box-shadow: none !important;
        }
        .btn-primary {
            background: #1a73e8;
            box-shadow: 0 2px 12px rgba(26, 115, 232, 0.25);
        }
        .btn-primary:hover {
            background: #1a6edb;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.35);
        }
        .btn-secondary {
            background: rgba(209, 213, 219, 0.7);
            backdrop-filter: blur(4px);
            color: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .btn-secondary:hover {
            background: rgba(185, 191, 199, 0.8);
        }
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            width: 80px;
            height: 80px;
            margin-left: -40px;
            margin-top: -40px;
            opacity: 0.6;
            transition: none;
            will-change: left, top;
        }
        .btn-primary .ripple {
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
        }
        .text-sm {
            font-size: 13px;
            color: #6b7280;
            margin-top: 8px;
            width: 100%;
        }
        #fullscreenIframeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10000;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
        }
        #fullscreenIframeContainer iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
            background: white;
        }
        #iframeLoadingMask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: opacity 0.3s;
        }
        #iframeLoadingMask .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(26,115,232,0.2);
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        #iframeLoadingMask .text {
            color: #4b5563;
            font-size: 13px;
        }
        #iframeLoadingMask.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .hidden { display: none !important; }
        @media (max-width: 400px) {
            .btn { padding: 12px 16px; font-size: 14px; }
        }
        #webappOkButtonGroup {
            display: none;
            margin-top: 12px;
            width: 100%;
        }

        /* ---------- 全屏引导层（WebApp 模式） ---------- */
        #webappGuide {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            display: none;
            background: rgba(0, 0, 0, 0.3);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        #webappGuide .guide-content {
            max-width: 320px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 24px 20px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        #webappGuide .guide-content p {
            margin: 0;
            line-height: 1.5;
        }
        #webappGuide .guide-arrow {
            font-size: 48px;
            margin: 4px 0;
            animation: bounce-down 1.5s infinite;
        }
        @keyframes bounce-down {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }
        #webappGuide .guide-sub {
            font-size: 14px;
            opacity: 0.8;
        }
        .guide-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 4px;
        }
        .guide-actions .btn-small {
            padding: 6px 14px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.15);
            transition: background 0.2s;
            pointer-events: auto;
        }
        .guide-actions .btn-small:hover {
            background: rgba(255,255,255,0.35);
        }
        .guide-name-display {
            font-size: 16px;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 8px;
            display: inline-block;
            max-width: 100%;
            word-break: break-all;
        }
    </style>
</head>
<body>
<!-- 全屏引导层 -->
<div id="webappGuide">
    <div class="guide-content">
        <p>📱 点击 Safari 分享按钮</p>
        <div class="guide-arrow">↓</div>
        <p class="guide-sub">选择「添加到主屏幕」</p>
        <div style="width:100%;height:1px;background:rgba(255,255,255,0.2);margin:4px 0;"></div>
        <div style="font-size:13px;opacity:0.8;">自定义主屏幕图标与名称</div>
        <div class="guide-actions">
            <button class="btn-small" id="guideChangeIcon">🖼️ 更换图标</button>
            <button class="btn-small" id="guideChangeName">✏️ 修改名称</button>
        </div>
        <div style="margin-top:4px;font-size:13px;opacity:0.6;">
            当前名称：<span id="guideCurrentNameDisplay" class="guide-name-display">webApp·</span>
        </div>
    </div>
</div>

<!-- 卡片容器 -->
<div class="container container-hidden" id="app">
    <div id="loadingPage" class="page active">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在解析Url参数，请等待加载完成再执行“添加到主屏幕”操作</div>
    </div>
    <div id="confirmPage" class="page">
        <div class="icon-wrapper" id="iconWrapper">
            <img id="faviconImg" src="" alt="网站图标" />
            <svg id="fallbackSvg" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
        </div>
        <div class="message" id="confirmMessage">
            <span>此页面想要跳转到</span>
            <span>（</span>
            <span class="url" id="targetUrlDisplay"></span>
            <span>），是否继续？</span>
        </div>
        <div id="openModeHint" class="open-mode-hint"></div>
        <div class="button-group" id="normalButtons">
            <button class="btn btn-primary" id="confirmBtn">确定</button>
            <button class="btn btn-secondary" id="cancelBtn">取消</button>
        </div>
        <div id="webappOkButtonGroup">
            <button class="btn btn-primary" id="webappOkBtn">好</button>
        </div>
    </div>
    <div id="errorPage" class="page">
        <div class="icon-wrapper"><span class="warning-char">⚠</span></div>
        <div class="error-msg">此页面未正确配置Url参数，无法跳转</div>
        <div class="text-sm">请检查链接格式<br />示例：?Domain-name=www.baidu.com&https-visit=true&open-mode=iframe</div>
        <div class="button-group" style="margin-top:16px;">
            <button class="btn btn-primary" id="errorOkBtn">好</button>
        </div>
    </div>
</div>

<!-- 隐藏的文件输入 -->
<input type="file" id="fileInput" accept="image/*" style="display:none;" />

<div id="fullscreenIframeContainer">
    <div id="iframeLoadingMask">
        <div class="spinner"></div>
        <div class="text">正在加载目标页面...</div>
    </div>
    <iframe id="fullscreenIframe" src="about:blank"></iframe>
</div>

<script>
(function() {
    // ---------- 工具函数 ----------
    function getParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
    }
    function cleanDomain(domain) {
        return domain.replace(/^https?:\/\//, '');
    }
    function showPage(pageId) {
        var pages = document.querySelectorAll('.page');
        for (var i = 0; i < pages.length; i++) {
            pages[i].classList.remove('active');
        }
        document.getElementById(pageId).classList.add('active');
    }

    // ---------- DOM 引用 ----------
    var container = document.getElementById('app');
    var guide = document.getElementById('webappGuide');
    var guideNameDisplay = document.getElementById('guideCurrentNameDisplay');
    var faviconImg = document.getElementById('faviconImg');
    var fallbackSvg = document.getElementById('fallbackSvg');

    // ---------- 全局变量 ----------
    var currentTitle = '';
    var currentIconUrl = '';

    // ---------- 更新 Apple Meta 标签 ----------
    function updateAppMeta(title, iconUrl) {
        if (title) {
            currentTitle = title;
            var meta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (!meta) {
                meta = document.createElement('meta');
                meta.name = 'apple-mobile-web-app-title';
                document.head.appendChild(meta);
            }
            meta.content = title;
            document.title = title;
            if (guideNameDisplay) {
                guideNameDisplay.textContent = title;
            }
        }
        if (iconUrl) {
            currentIconUrl = iconUrl;
            var oldLink = document.querySelector('link[rel="apple-touch-icon"]');
            if (oldLink) oldLink.remove();
            var link = document.createElement('link');
            link.rel = 'apple-touch-icon';
            link.href = iconUrl;
            document.head.appendChild(link);
            faviconImg.src = iconUrl;
            faviconImg.style.display = 'block';
            fallbackSvg.style.display = 'none';
        }
    }

    // ---------- 检测独立模式（主屏幕启动） ----------
    function isStandalone() {
        if (window.navigator.standalone) return true;
        if (window.matchMedia('(display-mode: standalone)').matches) return true;
        return false;
    }

    // ---------- 参数解析 ----------
    var domainRaw = getParam('Domain-name');
    var httpsFlag = getParam('https-visit');
    var openMode = getParam('open-mode');
    var webappMode = getParam('webapp-mode');
    var isWebapp = webappMode && webappMode.toLowerCase() === 'true';

    if (openMode && !['redirect', 'iframe', 'newwindow'].includes(openMode)) {
        openMode = 'redirect';
    }
    if (!openMode) openMode = 'redirect';

    var isValid = false;
    var targetUrl = '';
    var domain = '';
    if (domainRaw) {
        domain = cleanDomain(domainRaw);
        if (domain.length > 0) {
            var useHttps = httpsFlag && httpsFlag.toLowerCase() === 'true';
            targetUrl = (useHttps ? 'https://' : 'http://') + domain;
            isValid = true;
        }
    }

    // ---------- 默认标题 ----------
    function getDefaultTitle() {
        return 'webApp·' + targetUrl;
    }

    // ---------- 动作封装 ----------
    function performAction(action) {
        if (action === 'confirm') {
            if (openMode === 'redirect') {
                window.location.href = targetUrl;
            } else if (openMode === 'newwindow') {
                var newWin = window.open(targetUrl, '_blank');
                if (!newWin || newWin.closed || typeof newWin.closed === 'undefined') {
                    alert('弹窗被浏览器拦截，请允许本站弹出窗口，或更换为其他打开方式。');
                }
            } else if (openMode === 'iframe') {
                var containerIframe = document.getElementById('fullscreenIframeContainer');
                var iframe = document.getElementById('fullscreenIframe');
                var loadingMask = document.getElementById('iframeLoadingMask');
                containerIframe.style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                loadingMask.classList.remove('hidden');
                iframe.src = targetUrl;
                iframe.onload = function() {
                    loadingMask.classList.add('hidden');
                };
                iframe.onerror = function() {
                    loadingMask.classList.add('hidden');
                };
            }
        } else if (action === 'cancel') {
            history.back();
        } else if (action === 'errorOk') {
            container.classList.add('container-hidden');
        } else if (action === 'webappOk') {
            // 只关闭卡片，不隐藏引导层（引导层继续显示）
            container.classList.add('container-hidden');
        }
    }

    // ---------- 独立模式：直接跳转 ----------
    if (isValid && isStandalone()) {
        // 注入默认元数据
        if (targetUrl) {
            var defaultTitle = getDefaultTitle();
            var iconUrl = 'https://' + domain + '/favicon.ico';
            updateAppMeta(defaultTitle, iconUrl);
        }
        performAction('confirm');
        return;
    }

    // ---------- 非独立模式：显示卡片 ----------
    requestAnimationFrame(function() {
        container.classList.remove('container-hidden');
    });

    // ---------- 加载图标并配置UI ----------
    if (isValid) {
        var targetUrlDisplay = document.getElementById('targetUrlDisplay');
        var openModeHint = document.getElementById('openModeHint');
        var confirmMessage = document.getElementById('confirmMessage');
        var normalButtons = document.getElementById('normalButtons');
        var webappOkGroup = document.getElementById('webappOkButtonGroup');
        var webappOkBtn = document.getElementById('webappOkBtn');
        var iconWrapper = document.getElementById('iconWrapper');

        targetUrlDisplay.textContent = targetUrl;
        var defaultTitle = getDefaultTitle();

        if (isWebapp) {
            // webapp 模式界面
            confirmMessage.innerHTML = '<span>将</span><span class="url">' + targetUrl + '</span><span>添加到主屏幕？</span>';
            normalButtons.style.display = 'none';
            webappOkGroup.style.display = 'block';
            openModeHint.style.display = 'none';
            iconWrapper.classList.remove('clickable');

            // 显示引导层（始终显示，关闭卡片后也不隐藏）
            guide.style.display = 'flex';
            guideNameDisplay.textContent = defaultTitle;

            webappOkBtn.addEventListener('click', function() {
                performAction('webappOk');
            });

            // 引导层按钮事件
            document.getElementById('guideChangeIcon').addEventListener('click', function() {
                document.getElementById('fileInput').click();
            });
            document.getElementById('guideChangeName').addEventListener('click', function() {
                var newName = prompt('请输入新的应用名称（显示在主屏幕图标下方）：', currentTitle || defaultTitle);
                if (newName !== null && newName.trim() !== '') {
                    updateAppMeta(newName.trim(), currentIconUrl);
                }
            });
            document.getElementById('fileInput').addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    var dataUrl = ev.target.result;
                    updateAppMeta(currentTitle || defaultTitle, dataUrl);
                    this.value = '';
                };
                reader.readAsDataURL(file);
            });

        } else {
            // 普通模式
            var modeMap = {
                'redirect': '当前窗口跳转',
                'iframe': '内嵌全屏浏览',
                'newwindow': '新标签页打开'
            };
            openModeHint.textContent = '打开方式：' + (modeMap[openMode] || '当前窗口跳转');
            iconWrapper.classList.remove('clickable');
            webappOkGroup.style.display = 'none';
            normalButtons.style.display = 'flex';
            openModeHint.style.display = 'block';
            guide.style.display = 'none'; // 普通模式隐藏引导
        }

        // 加载 favicon 并注入默认元数据
        var iconUrl = 'https://' + domain + '/favicon.ico';
        updateAppMeta(defaultTitle, iconUrl);

        var isFinished = false;
        function finishLoading(iconSrc) {
            if (isFinished) return;
            isFinished = true;
            if (currentIconUrl === iconUrl || !currentIconUrl) {
                updateAppMeta(currentTitle || defaultTitle, iconSrc);
            }
            showPage('confirmPage');
        }
        var timeoutId = setTimeout(function() {
            if (!isFinished) {
                var svgElem = document.getElementById('fallbackSvg');
                var svgData = new XMLSerializer().serializeToString(svgElem);
                var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                var reader = new FileReader();
                reader.onload = function() {
                    finishLoading(reader.result);
                };
                reader.readAsDataURL(svgBlob);
            }
        }, 5000);
        faviconImg.src = iconUrl;
        faviconImg.onload = function() {
            clearTimeout(timeoutId);
            if (!isFinished) finishLoading(iconUrl);
        };
        faviconImg.onerror = function() {
            clearTimeout(timeoutId);
            if (!isFinished) {
                var svgElem = document.getElementById('fallbackSvg');
                var svgData = new XMLSerializer().serializeToString(svgElem);
                var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                var reader = new FileReader();
                reader.onload = function() {
                    finishLoading(reader.result);
                };
                reader.readAsDataURL(svgBlob);
            }
        };
    } else {
        showPage('errorPage');
        guide.style.display = 'none';
    }

    // ---------- 按钮交互（仅高光） ----------
    var btns = document.querySelectorAll('.btn');
    var activeBtn = null;
    var ripple = null;
    var isPointerDown = false;

    btns.forEach(function(btn) {
        btn.addEventListener('pointerdown', onPointerDown);
    });

    function onPointerDown(e) {
        var btn = e.currentTarget;
        e.preventDefault();

        if (ripple) {
            ripple.remove();
            ripple = null;
        }
        ripple = document.createElement('span');
        ripple.className = 'ripple';
        var size = Math.min(btn.offsetWidth * 0.6, 120);
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.marginLeft = (-size/2) + 'px';
        ripple.style.marginTop = (-size/2) + 'px';
        btn.appendChild(ripple);

        var rect = btn.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var half = size / 2;
        x = Math.min(Math.max(x, half), rect.width - half);
        y = Math.min(Math.max(y, half), rect.height - half);
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';

        isPointerDown = true;
        activeBtn = btn;
        btn.setPointerCapture(e.pointerId);
        btn.addEventListener('pointermove', onPointerMove);
        btn.addEventListener('pointerup', onPointerUp);
        btn.addEventListener('pointercancel', onPointerCancel);
    }

    function onPointerMove(e) {
        if (!isPointerDown || !activeBtn || !ripple) return;
        var btn = activeBtn;
        var rect = btn.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var size = parseFloat(ripple.style.width);
        var half = size / 2;
        x = Math.min(Math.max(x, half), rect.width - half);
        y = Math.min(Math.max(y, half), rect.height - half);
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        e.preventDefault();
    }

    function onPointerUp(e) {
        if (!isPointerDown || !activeBtn) {
            cleanup();
            return;
        }
        var btn = activeBtn;
        var rect = btn.getBoundingClientRect();
        var isInside = (e.clientX >= rect.left && e.clientX <= rect.right &&
                        e.clientY >= rect.top && e.clientY <= rect.bottom);
        if (isInside) {
            var action = null;
            if (btn.id === 'confirmBtn') action = 'confirm';
            else if (btn.id === 'cancelBtn') action = 'cancel';
            else if (btn.id === 'errorOkBtn') action = 'errorOk';
            else if (btn.id === 'webappOkBtn') action = 'webappOk';
            if (action) performAction(action);
        }
        cleanup();
        e.preventDefault();
    }

    function onPointerCancel(e) {
        cleanup();
        e.preventDefault();
    }

    function cleanup() {
        if (activeBtn) {
            activeBtn.releasePointerCapture && activeBtn.releasePointerCapture(activeBtn._pointerId);
            activeBtn.removeEventListener('pointermove', onPointerMove);
            activeBtn.removeEventListener('pointerup', onPointerUp);
            activeBtn.removeEventListener('pointercancel', onPointerCancel);
        }
        if (ripple) {
            ripple.remove();
            ripple = null;
        }
        isPointerDown = false;
        activeBtn = null;
    }

})();
</script>
</body>
</html>
